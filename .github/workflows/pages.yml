name: deploy showcase to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "notebooks/03_showcase.py"
      - "docs/cases/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install marimo (no other deps needed for the WASM export)
        run: uv sync --frozen

      - name: Build site directory
        run: |
          mkdir -p site
          uv run marimo export html-wasm notebooks/03_showcase.py --output site/index.html --mode run
          # Copy the case data alongside so the WASM notebook can fetch it via relative URL.
          cp -r docs/cases site/cases
          # Touch a .nojekyll so GitHub Pages serves files starting with _ properly.
          touch site/.nojekyll
          ls -la site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
